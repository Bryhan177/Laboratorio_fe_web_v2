<app-floating-configurator></app-floating-configurator>
<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-[100vw] overflow-hidden">
  <div class="flex flex-col items-center justify-center">
    <div style="border-radius: 56px; padding: 0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%)">
      <div class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20" style="border-radius: 53px">
        <div class="text-center mb-8">
          <div class="text-surface-900 dark:text-surface-0 text-3xl font-medium mb-4">¡Bienvenido!</div>
        </div>
        <!-- Formulario reactivo -->
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div>
            <label for="email1" class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">
              Correo electrónico
            </label>
            <input
              pInputText
              id="email1"
              type="text"
              formControlName="email"
              placeholder="Correo electrónico"
              class="w-full md:w-[30rem] mb-8"
            />

            <label for="password1" class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2">
              Contraseña
            </label>
            <p-password
              id="password1"
              formControlName="password"
              placeholder="Contraseña"
              [toggleMask]="true"
              styleClass="mb-4"
              [fluid]="true"
              [feedback]="false"
            ></p-password>

            <div class="flex items-center justify-between mt-2 mb-8 gap-8">
              <div class="flex items-center">
                <p-checkbox formControlName="rememberMe" id="rememberme1" binary class="mr-2"></p-checkbox>
                <label for="rememberme1">Recuérdame</label>
              </div>
            </div>

            <p-button label="Iniciar sesión" type="submit" styleClass="w-full" [disabled]="loginForm.invalid"></p-button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
