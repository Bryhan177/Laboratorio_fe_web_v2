<app-floating-configurator />

<!-- Botones en fila -->
<div class="absolute top-4 left-4 z-50 flex flex-col sm:flex-row gap-4">
    <button
        routerLink="/"
        pButton
        pRipple
        class="bg-blue-600 hover:bg-blue-700 text-black dark:text-white dark:hover:bg-blue-800 dark:bg-gray-900 font-bold py-3 px-6 sm:px-8 rounded-full text-base sm:text-lg shadow-lg transition transform hover:scale-105"
        (click)="volverAtras()"
    >
        ⬅️ Volver
    </button>

    <button
        class="bg-blue-600 hover:bg-blue-700 text-black dark:text-white dark:hover:bg-blue-800 dark:bg-gray-900 font-bold py-3 px-6 sm:px-8 rounded-full text-base sm:text-lg shadow-lg transition transform hover:scale-105"
        (click)="mostrarVideo()">
        🎥 Ver Video
    </button>
</div>

<!-- Contenedor principal -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8 items-center pt-32 sm:pt-14 px-4 sm:px-8">

  <!-- Contenedor del gráfico -->
  <div class="flex justify-center">
    <p-chart
      type="doughnut"
      [data]="pieData"
      [options]="pieOptions"
      class="w-[90%] sm:w-[75%] lg:w-[60%] max-w-full h-auto aspect-square">
    </p-chart>
  </div>

  <!-- Contenedor de las etapas -->
  <div class="card flex flex-col items-start">
    <div class="flex flex-col gap-4 w-full">
      <div *ngFor="let etapa of pieData.labels" class="flex items-center pb-3 sm:pb-4 gap-2">
        <!-- Cuadro de color -->
        <div class="w-4 h-4 rounded" [style.background-color]="etapa.color"></div>

        <!-- Texto de la etapa -->
        <span class="font-bold text-surface-900 dark:text-surface-0 text-sm sm:text-base">{{ etapa.id }}</span>
        <span class="text-surface-600 dark:text-surface-200 text-xs sm:text-sm">- {{ etapa.nombre }}</span>
      </div>
    </div>

    <!-- Botones de formulario y respuestas -->
    <div class="w-full flex flex-col sm:flex-row gap-4 mt-6">
      <a
        routerLink="/pages/questions"
        class="cursor-pointer px-4 sm:px-6 py-2 w-full sm:w-72 h-10 sm:h-12 hover:bg-yellow-400 bg-indigo-600 text-center text-white font-semibold rounded-lg shadow-md transition-all">
        Cuéntanos tu experiencia
      </a>
<!-- Botón Ver Respuestas con Validación -->
        <a (click)="validarUsuario()"
        class="cursor-pointer px-4 sm:px-6 py-2 w-full sm:w-72 h-10 sm:h-12 hover:bg-yellow-400 bg-indigo-600 text-center text-white font-semibold rounded-lg shadow-md transition-all">
        Ver respuestas
        </a>

    </div>
  </div>
</div>
