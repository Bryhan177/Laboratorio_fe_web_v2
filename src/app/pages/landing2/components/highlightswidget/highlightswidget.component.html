<div class="col-span-12 xl:col-span-6">
    <div class="card flex flex-col items-center">
      <p-chart
        type="doughnut"
        [data]="pieData"
        [options]="pieOptions"
        class="w-[90%] md:w-[75%] lg:w-[50%] max-w-full h-auto aspect-square">
      </p-chart>

      <!-- Botón para ir al formulario -->
      <a
        routerLink="/pages/questions"
        class="mt-6 cursor-pointer px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg shadow-md transition-all">
        Cuéntanos tu experiencia
      </a>
    </div>
  </div>
