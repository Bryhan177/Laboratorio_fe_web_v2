<section class="relative min-h-screen w-[100vw] overflow-hidden pt-44 rotate-100 transform bg-orange-500/20 [mask-image:linear-gradient(to_bottom,transparent_0%,black_20%,black_55%,transparent_100%)]">
  <div class="relative mx-auto max-w-7xl px-5 pt-6 sm:pt-10">
    <div class="absolute left-5 top-2 hidden lg:block">
      <div class="relative h-28 w-28">
        <svg viewBox="0 0 100 100" class="h-full w-full animate-[spin_16s_linear_infinite]">
          <defs>
            <path id="badge-circle" d="M50,50 m-36,0 a36,36 0 1,1 72,0 a36,36 0 1,1 -72,0" />
          </defs>
          <text class="fill-foreground text-[10.5px] font-semibold uppercase tracking-[0.18em] text-black">
            <textPath fill="currentColor" href="#badge-circle" startOffset="1%">
              Participa · Crea · Juega · Aprende ·
            </textPath>
          </text>
        </svg>
        <span class="absolute inset-0 m-auto flex h-16 w-16 items-center justify-center rounded-full bg-[#830479]">
          <i class="pi pi-building h-6 w-6Z text-white" aria-hidden="true" [style.font-size.px]="20"></i>
        </span>
      </div>
    </div>

    <h1 class="mx-auto max-w-4xl text-balance text-center font-heading text-5xl font-bold leading-[0.95] tracking-tight text-foreground sm:text-6xl lg:text-7xl">
      Transformando<br class="hidden sm:block" /> 
      <span class="bg-gradient-to-r from-[#28a0ae] to-[#f87e06] bg-clip-text text-7xl font-extrabold text-transparent">
        vidas
      </span>
      a través del <span class="bg-gradient-to-r from-[#28a0ae] to-[#f87e06] bg-clip-text text-7xl font-extrabold text-transparent">
        juego
      </span> y la <span class="bg-gradient-to-r from-[#28a0ae] to-[#f87e06] bg-clip-text text-7xl font-extrabold text-transparent">
        recreación
      </span>
    </h1>
  </div>

  <div class="relative z-10 mx-auto mt-14 hidden max-w-7xl items-center justify-center px-5 sm:mt-16 lg:flex" style="perspective: 1800px;">
    <div class="flex items-center justify-center" style="transform-style: preserve-3d;">
      
      @for (card of leftArcCards; track card.src) {
        <div
          class="relative mx-4 shrink-0 overflow-hidden rounded-2xl bg-card shadow-xl ring-4 ring-[#FFFFFF]"
          [ngClass]="[card.w, card.h]"
          [ngStyle]="{ 'transform': 'rotateY(' + card.rotate + 'deg) translateZ(' + card.z + 'px)' }">
          <img [src]="card.src || '/placeholder.svg'" [alt]="card.alt" class="absolute inset-0 h-full w-full object-cover" />
        </div>
      }

      <div class="relative z-10 mx-4 w-72 shrink-0">
        <span class="absolute -top-10 left-1/2 z-50 flex h-16 w-16 -translate-x-1/2 items-center justify-center">
          <img src="./assets/img/flecha.png" alt="Star" class="h-30 w-40">
        </span>
        <div class="relative h-96 overflow-hidden rounded-3xl shadow-2xl ring-4 ring-[#FFFFFF]">
          <img src="./assets/img/hero/rec-featured.png" alt="Grupo diverso colaborando en un taller participativo" class="absolute inset-0 h-full w-full object-cover" priority />
        </div>
      </div>

      @for (card of rightArcCards; track card.src) {
        <div
          class="relative mx-4 shrink-0 overflow-hidden rounded-2xl bg-card shadow-xl ring-4 ring-[#FFFFFF]"
          [ngClass]="[card.w, card.h]"
          [ngStyle]="{ 'transform': 'rotateY(' + card.rotate + 'deg) translateZ(' + card.z + 'px)' }">
          <img [src]="card.src || '/placeholder.svg'" [alt]="card.alt" class="absolute inset-0 h-full w-full object-cover" />
        </div>
      }
    </div>
  </div>

  <div class="relative z-10 mx-auto mt-10 grid max-w-3xl grid-cols-2 gap-3 px-5 sm:mt-12 sm:grid-cols-3 sm:gap-4 lg:hidden">
    <div class="relative order-first col-span-2 sm:col-span-3">
      <span class="absolute -top-4 left-1/2 z-10 flex h-11 w-11 -translate-x-1/2 items-center justify-center rounded-full bg-accent text-accent-foreground shadow-md ring-4 ring-background">
        <i class="pi pi-star text-xl" aria-hidden="true"></i>
      </span>
      <div class="relative aspect-[4/3] overflow-hidden rounded-3xl ring-1 ring-border">
        <img src="/rec-featured.png" alt="Grupo diverso colaborando en un taller participativo" class="absolute inset-0 h-full w-full object-cover" />
      </div>
      <div class="absolute -bottom-5 left-1/2 flex -translate-x-1/2 items-center gap-2 whitespace-nowrap">
        <button class="rounded-full bg-foreground px-5 py-2 text-sm font-semibold text-background hover:bg-foreground/90 flex items-center">
          <i class="pi pi-star mr-1 h-4 w-4" aria-hidden="true"></i>
          Ver talleres
        </button>
        <button class="rounded-full border-2 border-foreground/15 bg-card px-5 py-2 text-sm font-semibold text-foreground hover:bg-muted">
          Conócenos
        </button>
      </div>
    </div>
    
    @for (card of arcCards; track card.src) {
      <div class="relative aspect-[3/4] overflow-hidden rounded-2xl ring-1 ring-border">
        <img [src]="card.src" [alt]="card.alt" class="absolute inset-0 h-full w-full object-cover" />
      </div>
    }
  </div>
</section>
