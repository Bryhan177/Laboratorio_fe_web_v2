<div class="w-full bg-white">
    <div class="flex flex-col md:flex-row items-center justify-center p-10">
        <div class="bg-black w-full h-[45rem] p-20 bg-cover rounded-xl" [style]="'background-image: url(assets/img/team.jpg)'">
        </div>
        <div class="bg-white p-10 rounded-r-xl">
            <h1 class="text-3xl sm:text-4xl lg:text-[2.75rem] font-medium tracking-tight text-black leading-[1.15]">Participa con nosotros</h1>
            <p class="text-sm text-neutral-500 leading-relaxed font-normal mb-6 flex-grow line-clamp-3">Forma parte de nuestro equipo y contribuye al desarrollo de soluciones tecnológicas innovadoras.</p>
            <ul class="list-disc list-inside pb-5 text-sm text-neutral-500 leading-relaxed font-normal mb-6 flex-grow line-clamp-3">
                <li>Colabora en proyectos de investigación</li>
                <li>Accede a recursos y herramientas especializadas</li>
                <li>Participa en eventos y conferencias</li>    
            </ul>
            <div class="flex justify-center">
                <button class="bg-blue-500 text-white px-10 py-5 rounded-lg">
                    Quiero participar
                </button>
            </div>
        </div>
    </div>
